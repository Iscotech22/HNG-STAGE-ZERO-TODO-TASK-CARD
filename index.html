<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="A Professional Responsive Todo/Task Manager Built with HTML, CSS, and JavaScript,"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assest/image/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Todo Task Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section role="region" data-testid="test-todo-card" class="wrapper">
            <div class="container">
                <header>
                    <input 
                    type="checkbox" 
                    id="complete-task"
                    data-testid="test-todo-complete-toggle"
                    aria-label="Mark task as complete"
                    />
                    <h2 data-testid="test-todo-title">Create Diverse Wireframe</h2>
                    <!-- Status indicator -->
                    <strong data-testid="test-todo-status" aria-label="Task status: pending">
                        Pending
                    </strong>
                </header>
                <!-- Description section -->
                <article>
                    <p data-testid="test-todo-description" class="description">Discuss with UX Designer to develop the concept into comprehensive and effective wireframes.</p>

                </article>
            
                <div role="list" class="task-details" data-testid="test-todo-details">
                    <div role="listitem">
                        <span data-testid="test-todo-priority" class="priority">High</span>
                    </div>
                    <div role="listitem">
                        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00">
                            <i class="fa-solid fa-calendar-days"></i>
                            Due Apr 13, 2026
                        </time>
                    </div>
                    
                    <div role="listitem" class="due-date">
                        <time datetime="2026-04-16T18:00:00" data-testid="test-todo-time-remaining">
                            <i class="fa-solid fa-clock"></i>
                            Due in 3 days
                        </time>
                    </div>
                </div>

                <!-- List and button -->
                <div class="tag-btn-list">
                    <ul class="tags" role="list" data-testid="test-todo-tags">
                        <li data-testid="test-todo-tag-ux-design">UX Design</li>
                        <li data-testid="test-todo-tag-project-planning">Project Planning</li>
                    </ul>
                    <div class="button">
                        <button data-testid="test-todo-edit-button" aria-label="Edit Task">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button data-testid="test-todo-delete-button" aria-label="Delete Task">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
